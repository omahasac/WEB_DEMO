<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>中央氣象署 氣象預報中心 - 颱風資訊入口網</title>
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- jQuery -->
    <script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
    <!-- Lucide Icons -->
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Roboto:wght@300;400;500;700&family=Noto+Sans+TC:wght@300;400;500;700&display=swap');
        
        :root {
            /* Google Cloud Palette */
            --google-blue: #1a73e8;
            --google-blue-hover: #174ea6;
            --google-gray-700: #3c4043;
            --google-gray-600: #5f6368;
            --google-gray-200: #dadce0;
            --google-gray-100: #f1f3f4;
            --nav-height: 64px;
        }

        body {
            font-family: 'Roboto', 'Noto Sans TC', sans-serif;
            background-color: #ffffff;
            color: var(--google-gray-700);
            margin: 0;
            overflow: hidden;
        }

        /* Navbar Styling */
        .g-nav {
            height: var(--nav-height);
            border-bottom: 1px solid var(--google-gray-200);
            background: #ffffff;
            display: flex;
            align-items: center;
            padding: 0 24px;
            position: fixed;
            top: 0;
            width: 100%;
            z-index: 1000;
        }

        /* Dropdown Logic */
        .nav-group:hover .g-dropdown {
            display: block;
            opacity: 1;
            transform: translateY(0);
        }

        .g-dropdown {
            display: none;
            position: absolute;
            top: 100%;
            left: 0;
            background: #ffffff;
            min-width: 320px;
            box-shadow: 0 4px 16px rgba(0,0,0,0.12);
            border: 1px solid var(--google-gray-200);
            border-radius: 8px;
            padding: 8px 0;
            margin-top: -4px;
            z-index: 2000;
            transition: opacity 0.2s ease, transform 0.2s ease;
        }

        .dropdown-item {
            padding: 12px 24px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            color: var(--google-gray-700);
            font-size: 14px;
            font-weight: 400;
            transition: background 0.2s;
        }

        .dropdown-item:hover {
            background-color: var(--google-gray-100);
            color: var(--google-blue);
        }

        /* Iframe Area */
        #main-viewport {
            width: 100%;
            height: calc(100vh - var(--nav-height));
            border: none;
            margin-top: var(--nav-height);
            background: #ffffff;
        }

        /* Navbar Items Styling */
        .nav-label {
            height: var(--nav-height);
            padding: 0 16px;
            font-size: 14px;
            font-weight: 500;
            color: var(--google-gray-600);
            transition: all 0.2s;
            display: flex;
            align-items: center;
            gap: 8px;
            position: relative;
            border-bottom: 3px solid transparent;
        }

        .nav-label:hover {
            background-color: var(--google-gray-100);
            color: var(--google-gray-700);
        }

        .nav-label:hover .icon-wrapper {
            filter: drop-shadow(0 4px 6px rgba(0, 0, 0, 0.15));
            transform: translateY(-1px);
        }

        /* Active State with Colored Underline */
        .nav-label.active {
            color: var(--google-gray-700);
            background-color: var(--google-gray-100);
        }

        .icon-wrapper {
            transition: all 0.2s;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        /* Welcome Screen Overlay */
        #welcome-screen {
            position: fixed;
            top: var(--nav-height);
            left: 0;
            right: 0;
            bottom: 0;
            background-color: #ffffff;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            z-index: 500;
        }

        .g-btn-primary {
            background-color: var(--google-blue);
            color: white;
            padding: 10px 24px;
            border-radius: 4px;
            font-weight: 500;
            font-size: 14px;
            transition: background 0.2s;
        }

        .g-btn-primary:hover {
            background-color: var(--google-blue-hover);
            box-shadow: 0 1px 3px rgba(60,64,67, 0.3), 0 4px 8px 3px rgba(60,64,67, 0.15);
        }
    </style>
</head>
<body>

    <!-- Google Cloud Style Navbar -->
    <nav class="g-nav">
        <!-- Brand -->
        <div class="flex items-center gap-3 mr-8 cursor-pointer group" id="btn-home">
            <div class="w-8 h-8 flex items-center justify-center rounded bg-blue-600 text-white">
                <i data-lucide="cloud" class="w-5 h-5"></i>
            </div>
            <div class="flex flex-col">
                <span class="text-lg font-medium text-slate-700 leading-none">CWA</span>
                <span class="text-[10px] font-bold text-slate-400 tracking-wider">Typhoon Portal</span>
            </div>
        </div>

        <!-- Navigation Groups -->
        <div class="flex items-center flex-grow" id="nav-container">
            <!-- JS 內容注入 -->
        </div>

        <!-- Right Side Stats Removed as requested -->
    </nav>

    <!-- Welcome Overlay -->
    <div id="welcome-screen">
        <div class="max-w-2xl text-center space-y-8 animate-in fade-in duration-700">
            <div class="flex justify-center gap-6 mb-4">
                <div class="w-16 h-16 rounded-xl bg-blue-600 flex items-center justify-center text-white shadow-lg"><i data-lucide="zap" class="w-8 h-8"></i></div>
                <div class="w-16 h-16 rounded-xl bg-red-500 flex items-center justify-center text-white shadow-lg"><i data-lucide="activity" class="w-8 h-8"></i></div>
                <div class="w-16 h-16 rounded-xl bg-green-500 flex items-center justify-center text-white shadow-lg"><i data-lucide="bar-chart" class="w-8 h-8"></i></div>
            </div>
            <h1 class="text-4xl font-normal text-slate-800 tracking-tight">
                歡迎使用 <span class="font-bold text-blue-600">颱風資訊整合門戶</span>
            </h1>
            <p class="text-slate-500 text-lg font-light max-w-md mx-auto">
                這是中央氣象署氣象預報中心 2026 年決策支援環境。請從上方選單開始您的分析作業。
            </p>
            <div class="pt-8">
                <button class="g-btn-primary" onclick="$('#welcome-screen').fadeOut()">
                    開始工作
                </button>
            </div>
            <!-- Bottom tech icons removed as requested -->
        </div>
    </div>

    <!-- Iframe Content Container -->
    <iframe id="main-viewport" src="about:blank"></iframe>

    <script>
        // 資料物件 (包含各階段配色)
        const portalData = [
            {
                id: 'early-warning',
                title: '早期預警',
                icon: 'brain',
                color: '#4285F4', // Google Blue
                links: [
                    { name: 'AI預報MSLP', url: '#' },
                    { name: '即時AI颱風侵台機率', url: '#' },
                    { name: '新版颱風資訊整合網頁(純琨)', url: '#' }
                ]
            },
            {
                id: 'intelligence',
                title: '情資研判',
                icon: 'search',
                color: '#EA4335', // Google Red
                links: [
                    { name: '相似路徑分析', url: '#' },
                    { name: '新版颱風資訊整合網頁(純琨)', url: '#' }
                ]
            },
            {
                id: 'monitoring',
                title: '守視',
                icon: 'eye',
                color: '#FBBC04', // Google Yellow
                links: [
                    { name: '新版總雨量檢視', url: '#' },
                    { name: '雨量預估表格', url: '#' },
                    { name: '風力/雨量預報(鄉鎮郵票圖)', url: '#' }
                ]
            },
            {
                id: 'operations',
                title: '警戒作業',
                icon: 'shield',
                color: '#34A853', // Google Green
                links: [
                    { name: '風力預測表', url: '#' },
                    { name: '陸上颱風警戒與暴風圈接觸縣市接觸時間表', url: '#' },
                    { name: '即時風力/雨量觀測地圖', url: '#' },
                    { name: '定量降水預報-建議系統', url: '#' },
                    { name: '總雨量預估檢視&前置推估檢視', url: '#' }
                ]
            },
            {
                id: 'history',
                title: '歷史資料查詢',
                icon: 'history',
                color: '#9333EA', // Purple
                links: [
                    { name: '官方預報檢索', url: '#' },
                    { name: '校驗：強度,路徑,移速', url: '#' },
                    { name: '官方預報逐年校驗', url: '#' },
                    { name: '主觀預報逐年校驗', url: '#' }
                ]
            }
        ];

        $(document).ready(function() {
            renderNavigation();
            lucide.createIcons();

            // 回首頁邏輯
            $('#btn-home').on('click', function() {
                $('#welcome-screen').fadeIn(200);
                $('#main-viewport').attr('src', 'about:blank');
                $('.nav-label').removeClass('active').css('border-bottom-color', 'transparent');
            });
        });

        // 渲染 Google Cloud 風格導覽列
        function renderNavigation() {
            const $container = $('#nav-container');
            portalData.forEach(stage => {
                let dropdownContent = '';
                stage.links.forEach(link => {
                    dropdownContent += `
                        <div class="dropdown-item cursor-pointer group" onclick="openModule('${link.url}', '${link.name}', '${stage.id}', '${stage.color}')">
                            <span>${link.name}</span>
                            <i data-lucide="arrow-right" class="w-3 h-3 opacity-0 group-hover:opacity-100 transition-opacity"></i>
                        </div>
                    `;
                });

                const html = `
                    <div class="nav-group relative">
                        <div class="nav-label cursor-pointer" data-id="${stage.id}" data-color="${stage.color}">
                            <div class="icon-wrapper" style="color: ${stage.color}">
                                <i data-lucide="${stage.icon}" class="w-5 h-5"></i>
                            </div>
                            ${stage.title}
                            <i data-lucide="chevron-down" class="w-3 h-3 ml-1 opacity-50"></i>
                        </div>
                        <div class="g-dropdown">
                            <div class="px-6 py-2 text-[10px] font-bold text-slate-400 uppercase tracking-widest border-b border-slate-100 mb-1">
                                ${stage.title} 子系統
                            </div>
                            ${dropdownContent}
                        </div>
                    </div>
                `;
                $container.append(html);
            });
            lucide.createIcons();
        }

        // 開啟模組
        function openModule(url, name, stageId, stageColor) {
            $('#welcome-screen').fadeOut(200);
            
            // 重置所有標籤狀態
            $('.nav-label').removeClass('active').css('border-bottom-color', 'transparent');
            
            // 啟用當前階段標籤與底線
            const $activeLabel = $(`.nav-label[data-id="${stageId}"]`);
            $activeLabel.addClass('active').css('border-bottom-color', stageColor);

            // 模擬載入 URL
            console.log(`系統提示: 正在載入模組 [${name}]`);
            // $('#main-viewport').attr('src', url);
        }
    </script>
</body>
</html>
